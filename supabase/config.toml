# EPT-Kompass Supabase config.
#
# Consumed by `supabase start` (CLI ≥ 1.140.0) for local dev. The remote
# Supabase-cloud project needs no corresponding file — link with:
#
#   supabase link --project-ref <your-project-ref>
#
# Then push migrations with:
#
#   supabase db push

project_id = "ept-kompass"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"

[auth.sms]
enable_signup = false
enable_confirmations = false

# Google OAuth is wired for production via the Supabase dashboard; local
# dev falls back to the magic-link email flow (delivered to Inbucket).
[auth.external.google]
enabled = false
client_id = ""
secret = ""

[edge_runtime]
enabled = true
inspector_port = 8083

[analytics]
enabled = false
